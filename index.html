<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <script src="./app.js" defer type="module"></script>
    <title>Contatos</title>
</head>

<body class="min-h-screen flex flex-col items-center gap-8 px-6 py-10 font-['Red_Hat_Display']"
    style="background-color: #98d6f3">

    <!-- Título -->
    <header class="text-center">
        <h1 class="text-white text-5xl font-bold drop-shadow-md">
            Lista de Contatos
        </h1>
        <p class="text-white text-lg mt-2">
            Cadastre, atualize e exclua seus contatos
        </p>
    </header>

    <!-- Formulário -->
    <section class="bg-white/40 backdrop-blur-md rounded-3xl shadow-lg p-8 w-full max-w-5xl flex flex-col gap-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="nome"
                class="bg-white text-gray-700 h-12 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400"
                type="text" placeholder="Nome">

            <input id="telefone"
                class="bg-white text-gray-700 h-12 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400"
                type="text" placeholder="Telefone">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="email"
                class="bg-white text-gray-700 h-12 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400"
                type="email" placeholder="E-mail">

            <input id="senha"
                class="bg-white text-gray-700 h-12 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400"
                type="password" placeholder="Senha">
        </div>

        <input type="text" placeholder="URL foto" id="foto"
            class="bg-white text-gray-700 h-12 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">

        <div class="flex justify-end">
            <button id="botao-cadastrar"
                class="bg-blue-500 hover:bg-blue-600 transition text-white font-bold h-12 w-40 rounded-full cursor-pointer shadow-md">
                SALVAR
            </button>
        </div>

    </section>

    <!-- Linha -->
    <hr class="border-t border-white/70 w-full max-w-6xl">

    <!-- Tabela -->
    <section class="w-full max-w-6xl bg-white rounded-3xl shadow-lg overflow-hidden">

        <table class="w-full border-collapse text-center">
            <thead>
                <tr class="bg-blue-500 text-white">
                    <th class="p-4">ID</th>
                    <th class="p-4">Foto</th>
                    <th class="p-4">Nome</th>
                    <th class="p-4">E-mail</th>
                    <th class="p-4">Ação</th>
                </tr>
            </thead>

            <tbody id="lista-contatos">
                <tr class="border-b border-gray-200 hover:bg-blue-50 transition">
                    <td class="p-4">1</td>

                    <td class="p-4">
                        <div class="w-12 h-12 bg-gray-300 rounded-full mx-auto flex items-center justify-center">
                            <i class="fa-solid fa-user text-gray-600"></i>
                        </div>
                    </td>

                    <td class="p-4 text-gray-700 font-medium">May</td>

                    <td class="p-4 text-gray-600">may@email.com</td>

                    <td class="p-4">
                        <div class="flex justify-center gap-3">
                            <button
                                class="bg-yellow-400 hover:bg-yellow-500 transition text-white px-4 py-2 rounded-full cursor-pointer">
                                Atualizar
                            </button>

                            <button
                                class="bg-red-500 hover:bg-red-600 transition text-white px-4 py-2 rounded-full cursor-pointer">
                                Deletar
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

    </section>

</body>

</html>
