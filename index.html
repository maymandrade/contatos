<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <script src="./app.js" defer type="module"></script>
    <title>Contatos</title>
</head>

<body class="min-h-screen flex flex-col items-center gap-6" style="background-color: #98d6f3">

    <div class="text-white text-[48px]">Lista de Contatos</div>
    <div class="flex flex-col gap-4  mg-35">
        <div class="flex items-center justify-center gap-4 w-200 mg-35">
            <input id="nome" class="bg-white text-grey w-200 h-10 p-3 " type="text" placeholder="Nome">
            <input id="telefone" class="bg-white text-grey w-200 h-10 p-3" type="text" placeholder="telefone">
        </div>
        <div class="flex items-center justify-center gap-4 w-200 mg-35">
            <input id="email" class="bg-white text-grey w-200 h-10 p-3" type="email" placeholder="Email">
            <input id="senha" class="bg-white text-grey w-200 h-10 p-3" type="password" placeholder="Senha">
        </div>

    </div>
    <div class="flex justify-end w-190">
        <button id="botao-cadastrar" class="border-2 border-white cursor-pointer text-white h-10 w-40 rounded-3xl">
            SALVAR</button>
    </div>
    <hr class="border-t border-white w-full ">

    <table class=" fixed top-90 w-200 items-center justify-center border-1 border-gray-400" style="background-color: brown;">
        <thead>
            <tr id="cabeçalho">
                <th class="bg-white w-10 h-10 p-3 border-1 border-gray-400">ID</th>
                <th class="bg-white w-10 h-10 p-3 border-1 border-gray-400">Foto</th>
                <th class="bg-white w-20 h-10 p-3 border-1 border-gray-400">Nome</th>
                <th class="bg-white w-20 h-10 p-3 border-1 border-gray-400">E-mail</th>
                <th class="bg-white w-50 h-10 p-3 border-1 border-gray-400">Ação</th>
            </tr>
        </thead>

        <tbody>
            <tr id="itens">
                <td class="bg-white w-10 h-10 p-3 border-1 border-gray-400"></td>
                <td class="bg-white w-20 h-10 p-3 border-1 border-gray-400"></td>
                <td class="bg-white w-20 h-10 p-3 border-1 border-gray-400"></td>
                <td class="bg-white w-20 h-10 p-3 border-1 border-gray-400"></td>
                <td class="bg-white h-14 p-3 flex justify-center gap-4 border-gray-400" >
                    <button class="border-1 p-3 items-center flex cursor-pointer border-gray-400">Atualizar</button>
                    <button class="border-1 p-3 items-center flex cursor-pointer border-gray-400">Deletar</button>
                </td>
            </tr>
        </tbody>

    </table>


</body>

</html>
